<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Career Signal Engine</title>

    <meta name="description" content="Career Signal Engine checks whether a CV has enough evidence, outcomes, metrics, and defensible impact before generating a job-specific reconstruction plan.">
    <meta name="keywords" content="CV builder, resume builder, CV evidence score, career signal, ATS optimization, job tailoring, CV reconstruction, high impact CV, resume evidence, career strategy">
    <meta name="author" content="Federico Navarrete">
    <meta name="robots" content="index, follow">

    <meta property="og:title" content="Career Signal Engine">
    <meta property="og:description" content="Check CV evidence before tailoring. Generate a grounded reconstruction plan for a target company and job description.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="img/preview.png">
    <meta property="og:site_name" content="Career Signal Engine">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Career Signal Engine">
    <meta name="twitter:description" content="Check CV evidence before tailoring. Generate a grounded reconstruction plan for a target company and job description.">
    <meta name="twitter:image" content="img/preview.png">

    <link rel="stylesheet" href="./styles.css" />
    <link rel="apple-touch-icon" sizes="180x180" href="img/favicons/apple-touch-icon.png">
    <link rel="icon" href="img/favicons/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicons/favicon-16x16.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="theme-color" content="#1d2528">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1 data-copy="site.title"></h1>
          <p data-copy="site.subtitle"></p>
        </div>
        <div class="topbar-actions">
          <button id="cvBasicsButton" class="secondary" type="button" data-copy="buttons.cvBasics"></button>
          <span id="status" class="status" data-copy="feedback.readyStatus"></span>
        </div>
      </header>

      <section class="panel">
        <h2 data-copy="sections.profile"></h2>
        <div class="grid">
          <label>
            <span data-copy="labels.yearsOfExperience"></span>
            <input id="yearsOfExperience" type="number" min="0" required />
          </label>
          <label id="degreeWrap" class="hidden">
            <span data-copy="labels.studiesListed"></span>
            <select id="hasDegree"></select>
          </label>
          <label id="degreeYearWrap" class="hidden">
            <span data-copy="labels.degreeYear"></span>
            <input id="degreeYear" type="number" min="1900" />
          </label>
          <label>
            <span data-copy="labels.experienceSelectionMode"></span>
            <select id="experienceSelectionMode"></select>
          </label>
        </div>
        <div id="ageWarning" class="warning hidden">
          <p data-copy="feedback.ageWarning"></p>
          <label class="check"><input id="ageWarningAcknowledged" type="checkbox" /> <span data-copy="labels.ageWarningAcknowledgement"></span></label>
        </div>
        <p id="allExperienceWarning" class="warning hidden" data-copy="feedback.allExperienceWarning"></p>
      </section>

      <section class="panel">
        <h2 data-copy="sections.cvInput"></h2>
        <p class="guidance" data-copy="feedback.cvInputGuidance"></p>
        <div class="grid">
          <label>
            <span data-copy="labels.cvPdf"></span>
            <input id="cvPdf" type="file" accept="application/pdf" />
          </label>
          <label>
            <span data-copy="labels.cvText"></span>
            <textarea id="cvText" rows="12" data-placeholder="placeholders.cvText"></textarea>
          </label>
        </div>
        <div class="grid compact-grid">
          <label>
            <span data-copy="labels.aiProvider"></span>
            <select id="aiProvider"></select>
          </label>
          <label>
            <span data-copy="labels.aiModel"></span>
            <select id="aiModel"></select>
          </label>
          <label>
            <span id="aiApiKeyLabel" data-copy="labels.aiApiKey"></span>
            <input id="openaiApiKey" type="password" autocomplete="off" />
          </label>
        </div>
        <div id="precheckFeedback" class="feedback" role="status" aria-live="polite"></div>
        <button id="precheckButton" class="primary" data-copy="buttons.precheckIdle"></button>
      </section>

      <section id="precheckPanel" class="panel hidden">
        <h2 data-copy="sections.precheck"></h2>
        <div id="precheckResult"></div>
        <div id="decisionGate" class="actions"></div>
      </section>

      <section id="tailoringPanel" class="panel locked">
        <h2 data-copy="sections.tailoring"></h2>
        <p id="tailoringGuidance" class="guidance"></p>
        <div class="grid">
          <label>
            <span data-copy="labels.targetCompany"></span>
            <input id="companyName" type="text" />
          </label>
          <label>
            <span data-copy="labels.targetStyle"></span>
            <select id="targetStyle"></select>
          </label>
        </div>
        <label>
          <span data-copy="labels.companyDescription"></span>
          <textarea id="companyDescription" rows="4" data-placeholder="placeholders.companyDescription"></textarea>
        </label>
        <label>
          <span data-copy="labels.jobDescription"></span>
          <textarea id="jobDescription" rows="12" data-placeholder="placeholders.jobDescription"></textarea>
        </label>
        <p id="tailoringLockMessage" class="lock-message"></p>
        <button id="analyzeButton" class="primary" data-copy="buttons.analyzeIdle"></button>
      </section>

      <section id="outputPanel" class="panel hidden">
        <h2 data-copy="sections.output"></h2>
        <div id="analysisResult"></div>
        <button id="downloadButton" class="secondary" data-copy="buttons.downloadPlan"></button>
      </section>
    </main>

    <footer class="site-footer">
      <div id="siteFooterInner" class="site-footer-inner"></div>
    </footer>

    <div id="cvBasicsModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="cvBasicsTitle">
      <div class="modal-backdrop" data-close-modal></div>
      <section class="modal-panel">
        <header class="modal-header">
          <div>
            <h2 id="cvBasicsTitle" data-copy="cvBasics.title"></h2>
            <p data-copy="cvBasics.subtitle"></p>
          </div>
          <button id="cvBasicsClose" class="icon-button" type="button"></button>
        </header>

        <div id="cvBasicsBody" class="modal-body"></div>
      </section>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
