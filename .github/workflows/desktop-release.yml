name: Build Windows Desktop Release

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish assets to, for example v1.0.1"
        required: false
        type: string

permissions:
  contents: write

jobs:
  windows-desktop:
    name: Build Windows .exe
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      - name: Install desktop dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm --prefix backend ci

      - name: Typecheck backend
        run: npm --prefix backend run typecheck

      - name: Build Windows desktop app
        run: npm run desktop:dist

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: career-signal-windows
          path: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
          if-no-files-found: error

      - name: Publish files to GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release' || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml
